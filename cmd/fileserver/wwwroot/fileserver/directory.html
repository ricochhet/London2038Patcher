<!DOCTYPE html>
<html>

<head>
    <title>fileserver | {{.Title}}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/css/base.css">
    <link rel="stylesheet" href="/css/extra.css">
</head>

<body class="slv-ignore-darkreader">
    <h1>fileserver</h1>

    <div class="fs-lang-wrap">
        <select id="fs-lang-select" class="fs-lang-select" aria-label="Language"></select>
    </div>

    <div class="fs-header-row">
        <div class="breadcrumb">
            {{range .Breadcrumbs}}
            {{if .Link}}<a href="{{.Link}}">{{.Name}}</a>{{else}}<span class="current">{{.Name}}</span>{{end}}
            {{if not .IsLast}}<span class="sep">/</span>{{end}}
            {{end}}
            {{if .HasReadme}}<a class="fs-readme-anchor" href="#readme-render"
                data-i18n="readme_link_text"
                data-i18n-title="readme_link_title">README ↓</a>{{end}}
        </div>
        <span id="fs-dir-meta" class="fs-dir-meta"></span>
    </div>

    <div class="fs-search-wrap">
        <div class="fs-search-bar">
            <input class="fs-search-input" type="text" id="fs-search-input"
                data-i18n-placeholder="search_placeholder"
                placeholder="Search files…"
                autocomplete="off" spellcheck="false">
            <button class="fs-search-toggle" id="fs-content-toggle"
                data-i18n="search_in_files"
                data-i18n-title="search_in_files_title"
                title="Also search inside file contents">⊞ In files</button>
        </div>
        <div id="fs-tag-hint" class="fs-tag-hint"></div>
        <div class="fs-search-results" id="fs-search-results"></div>
    </div>

    <hr>

    <table class="fs-table">
        <thead>
            <tr>
                <th data-sort="name"     class="fs-th-sort" data-i18n="col_name">Name</th>
                <th data-sort="size"     class="fs-th-sort" data-i18n="col_size">Size</th>
                <th data-sort="modified" class="fs-th-sort" data-i18n="col_modified">Modified</th>
                <th data-i18n="col_actions">Actions</th>
            </tr>
        </thead>
        <tbody id="fs-tbody">
            {{if .Parent}}
            <tr class="fs-parent">
                <td><a href="{{.Parent}}" class="fs-name"><span class="fs-icon">↩</span><span>..</span></a></td>
                <td class="fs-meta">—</td>
                <td class="fs-meta">—</td>
                <td></td>
            </tr>
            {{end}}
        </tbody>
    </table>

    <div id="fs-preview-modal" class="fs-preview-modal">
        <div class="fs-preview-backdrop" id="fs-preview-backdrop"></div>
        <div class="fs-preview-panel">
            <div class="fs-preview-header">
                <span id="fs-preview-title" class="fs-preview-title"></span>
                <div class="fs-preview-actions">
                    <a id="fs-preview-dl" class="fs-btn secondary" href="#"
                        data-i18n="btn_download">Download</a>
                    <button id="fs-preview-close" class="fs-btn secondary">✕</button>
                </div>
            </div>
            <div id="fs-preview-body" class="fs-preview-body"></div>
        </div>
    </div>

    <script>
        window.FS_CONFIG = {
            route:     {{.Route | printf "%q"}},
            parent:    {{if .Parent}}{{.Parent | printf "%q"}}{{else}}""{{end}},
            entries:   {{.EntriesJSON}},
            imageExts: {{.ImageExtsJSON}},
            textExts:  {{.TextExtsJSON}},
            fileCount: {{.FileCount}},
            totalSize: {{.TotalSize | printf "%q"}}
        };
    </script>
    <script src="/js/directory.js"></script>

    {{if .Readme}}
    <hr>
    <div id="readme-src" style="display:none">{{.Readme}}</div>
    <div id="readme-render" class="readme"></div>
    <script src="/js/marked.min.js"></script>
    <script src="/js/readme.js"></script>
    {{end}}

</body>
</html>
